<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日账单</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>
<div class="page-shell">

  <div class="app-header">
    <div class="app-title">
      <h1>今日账单</h1>
      <p>只显示今天的收款记录</p>
    </div>

<div class="header-actions">
  <div id="globalNav"></div>
</div>

</div>

  <div class="panel">
    <h2>今日收入</h2>
    <div id="todaySummary" style="font-weight:900;line-height:1.8;"></div>
    <div id="todayPayStats" style="margin-top:10px;color:#8a8174;font-weight:800;"></div>
  </div>

  <div class="panel">

    <h2>今日账单明细</h2>

    <div style="overflow:auto;">
      <table class="record-table">
        <thead>
          <tr>
            <th>
              <button id="todayTimeSortButton" type="button" onclick="toggleTodayTimeSort()"
                style="border:0;background:transparent;padding:0;font:inherit;font-weight:900;color:inherit;cursor:pointer;white-space:nowrap;">
                时间 ▲
              </button>
            </th>
            <th>桌位</th>
            <th>客人</th>
            <th>类型</th>
            <th>套餐</th>
            <th>续费</th>
            <th>原价</th>
            <th>日元</th>
            <th>人民币</th>
            <th>付款</th>
            <th>币种</th>
            <th>抹零</th>
            <th>收款截图</th>
            <th>续费确认</th>
            <th>修改</th>
          </tr>
        </thead>
        <tbody id="todayRecords"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="modal-bg" id="editRecordModalBg">
  <div class="modal">
    <h2>修改账单</h2>

    <div id="editRecordInfo" style="font-weight:900;line-height:1.8;margin-bottom:10px;"></div>

    <label>付款明细</label>
    <div id="editPaymentsList"></div>
    <button type="button" class="btn-ghost" style="width:100%;margin:8px 0 12px;" onclick="addEditPaymentRow()">＋ 添加付款记录</button>
    <div style="font-size:13px;color:#777;line-height:1.5;margin-bottom:10px;">这里的修改会直接更新真实付款记录，包括付款方式、金额和备注。</div>

    <label>营业日期</label>
    <input id="editBusinessDate" type="date">


    <label>是否一人代付</label>
    <select id="editGroupPaid">
      <option value="">否</option>
      <option value="yes">是</option>
    </select>

    <label>付款人</label>
    <input id="editGroupPayerName" placeholder="例：1号桌客人 / 王小姐">

    <label>代付组ID</label>
    <input id="editGroupPaymentId" placeholder="同一组代付填一样，例如 group_20260704_1">

    <label>备注</label>
    <input id="editPaymentNote" placeholder="例：A客人代付两人费用，后续加时也由A支付">

    <div class="action-row">
      <button class="btn-main" onclick="saveEditedRecord()">保存修改</button>
      <button class="btn-ghost" onclick="closeEditRecord()">取消</button>
    </div>
  </div>
</div>


<div class="modal-bg" id="editGroupModalBg">
  <div class="modal edit-group-modal">
    <h2>修改组 / 添加桌位</h2>
    <div id="editGroupInfo" class="edit-group-info"></div>
    <p class="edit-group-help">选择要放进这个组的桌位。已选桌位会高亮显示。</p>
    <div id="editGroupRecordList" class="edit-group-record-list"></div>
    <div class="action-row">
      <button class="btn-main" onclick="saveEditedGroup()">保存组桌位</button>
      <button class="btn-ghost" onclick="closeEditGroup()">取消</button>
    </div>
  </div>
</div>

<input
  id="receiptInput"
  type="file"
  accept="image/*"
  style="display:none"
  onchange="handleReceiptFileChange(event)"
>

<script type="module">
import { renderNav } from "./js/nav.js";

renderNav("bill");
import("./js/today-bill.js?v=4.0.14");
</script>


</body>
</html>
