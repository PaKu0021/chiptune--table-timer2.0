<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>老板模式</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>
<script>
(function(){
  try{
    if(sessionStorage.getItem("owner_auth") === "1") return;
    const pw = window.prompt("请输入老板密码");
    if(pw !== "prompt"){
      window.alert("密码错误");
      window.location.replace("./index.html");
      return;
    }
    sessionStorage.setItem("owner_auth","1");
    sessionStorage.setItem("owner_auth_time",String(Date.now()));
  }catch(err){
    window.location.replace("./index.html");
  }
})();
</script>

<div class="page-shell">

<div class="app-header">
  <div class="app-title">
    <h1>老板模式</h1>
    <p>收入统计 / 套餐设置 / 桌位数量 / 收银记录</p>
  </div>

  <div class="header-actions">
    <div id="globalNav" class="header-actions"></div>
    <button class="btn-danger" onclick="logoutOwner()">退出老板模式</button>
  </div>
</div>

<div class="action-row">
<button
  id="btnQrPage"
  class="btn-main"
  onclick="openQrPage()"
>
  打印桌位二维码
</button>

<button
  id="btnCashierPage"
  class="btn-main"
  onclick="openCashierPage()"
>
  查看收银记录
</button>
</div>
  
  <div class="panel">
    <div class="action-row">
      <button id="f_today" onclick="setFilter('today')">今天</button>
      <button id="f_week" onclick="setFilter('week')">本周</button>
      <button id="f_month" onclick="setFilter('month')">本月</button>
      <button id="f_year" onclick="setFilter('year')">本年</button>
      <button id="f_all" onclick="setFilter('all')">全部</button>
    </div>

    <div class="action-row">
      <button id="c_jpy" onclick="setCurrencyMode('JPY')">日元收入</button>
      <button id="c_rmb" onclick="setCurrencyMode('RMB')">人民币收入</button>
      <button id="c_converted" onclick="setCurrencyMode('CONVERTED')">换算总收入</button>
    </div>

    <h2 id="summary">加载中...</h2>
    <div id="payStats"></div>
  </div>

  <div class="panel">
    <h2>收入折线图</h2>
    <canvas id="chart" role="img" aria-label="收入折线图"></canvas>
  </div>

  <div class="panel">
    <h2>桌位数量</h2>
    <div class="action-row">
      <input id="tableCount" type="number" min="1" max="50" style="max-width:100px;">
      <button class="btn-main" onclick="saveTableCount()">保存桌位数量</button>
    </div>
  </div>

<div class="panel">

  <button
    class="btn-ghost full"
    onclick="
      const box=document.getElementById('businessHoursBox');
      box.style.display=
      box.style.display==='none'?'block':'none';
    ">
    营业时间设置 ▼
  </button>

  <div id="businessHoursBox" style="display:none;margin-top:16px;">

    <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:10px;">

      <div>
        <small>周一～周五 开始</small>
        <input id="weekdayOpen" type="number">
      </div>

      <div>
        <small>周一～周五 结束</small>
        <input id="weekdayClose" type="number">
      </div>

      <div>
        <small>周六～周日 开始</small>
        <input id="weekendOpen" type="number">
      </div>

      <div>
        <small>周六～周日 结束</small>
        <input id="weekendClose" type="number">
      </div>

    </div>

    <div style="margin-top:12px;">
      <button class="btn-main full" onclick="saveBusinessHours()">
        保存营业时间
      </button>
    </div>

  </div>

</div>  

<div class="panel">
  <div class="section-toggle" onclick="togglePackagePanel()">
    <div>
      <h2>套餐设置</h2>
      <p style="color:#8a8174;margin:6px 0 0;">分钟填 0 = 不限时。续费金额按每小时计算。</p>
    </div>

    <button id="packageToggleBtn" class="btn-ghost" type="button">展开</button>
  </div>

  <div id="packagePanelBody" style="display:none;margin-top:16px;">
    <p class="package-setting-note">在这里新增或修改套餐。保存后，所有计时器桌位的套餐下拉列表都会自动显示这些套餐。</p>
    <div id="packageBox"></div>

    <div class="action-row">
      <button class="btn-main" onclick="addPackage()">＋ 添加套餐</button>
      <button class="btn-main" onclick="savePackages()">保存套餐设置</button>
    </div>
  </div>
</div>

  <div class="panel">
    <h2>收银记录</h2>

<div class="panel">
  <div class="section-toggle" onclick="toggleCustomerPanel()">
    <div>
      <h2>客户管理</h2>
      <p style="color:#8a8174;margin:6px 0 0;">
        查看客户来店次数 / 累计消费 / 最近来店记录
      </p>
    </div>

    <button id="customerToggleBtn" class="btn-ghost" type="button">展开</button>
  </div>

  <div id="customerPanelBody" style="display:none;margin-top:16px;">

    <div class="action-row">
      <input
        id="customerSearch"
        placeholder="搜索姓名或手机尾号"
        oninput="setCustomerSearch(this.value)"
      >
    </div>

    <div id="customerSummary" style="font-weight:900;margin:10px 0;color:#8a8174;">
      加载中...
    </div>

    <div style="overflow:auto;">
      <table class="record-table">
        <thead>
          <tr>
            <th>客人</th>
            <th>手机尾号</th>
            <th>来店次数</th>
            <th>累计消费</th>
            <th>最近来店</th>
            <th>最近套餐</th>
          </tr>
        </thead>
        <tbody id="customerRows"></tbody>
      </table>
    </div>

  </div>
</div>

    <div style="overflow:auto;">
      <table class="record-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>桌位</th>
            <th>客人</th>
            <th>类型</th>
            <th>套餐</th>
            <th>续费</th>
            <th>原价</th>
            <th>日元</th>
            <th>人民币</th>
            <th>付款</th>
            <th>币种</th>
            <th>抹零</th>
            <th>收款截图</th>
            <th>续费确认</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="records"></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
  import { renderNav } from "./js/nav.js";

  window.addEventListener("DOMContentLoaded", async ()=>{
    renderNav("owner");
    import("./js/owner.js?v=2.9.8").catch(e=>{
  console.error(e);
  alert(
    e.message +
    "\n\nURL:\n" +
    e.url +
    "\n\nLine: " +
    e.lineNumber
  );
});
    
  });
</script>

</body>
</html>
