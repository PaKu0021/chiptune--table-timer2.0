<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chiptune 系统</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body class="home-page">

<div class="home-shell">
<div class="brand-card brand-dashboard">
  <div class="hero-top">
    <div class="logo-dot">C</div>
    <div>
      <h1>Chiptune</h1>
      <p>池袋拼豆体验店管理系统</p>
    </div>
  </div>

  <div class="hero-stats">
    <div class="stat-item">
      <div class="stat-label">使用中</div>
      <div class="stat-value" id="homeUsingCount">0桌</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">空闲</div>
      <div class="stat-value" id="homeFreeCount">0桌</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">今日预约</div>
      <div class="stat-value" id="homeBookingCount">0组</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">今日营业额</div>
      <div class="stat-value" id="homeRevenue">¥0</div>
    </div>
  </div>
</div>
  <div class="home-grid">
    <button class="home-card primary" onclick="go('./app.html')">
      <span class="emoji">⏱️</span>
      <strong>进入计时系统</strong>
      <small>桌位计时 / 结账 / 二维码 / 超时提醒</small>
    </button>


    <button class="home-card" onclick="location.href='./today-bill.html'">
  <div class="emoji">🧾</div>
  <strong>今日账单</strong>
  <small>只查看今天收款记录</small>
</button>

    <button class="home-card" onclick="goOwner()">
      <span class="emoji">📊</span>
      <strong>老板模式</strong>
      <small>收入统计 / 报表 / CSV导出</small>
    </button>

    <button class="home-card" onclick="go('./booking.html')">
      <span class="emoji">📅</span>
      <strong>预约系统</strong>
      <small>客人预约 / 指定桌位 / 调整座位</small>
    </button>
  </div>
</div>
 
<script type="module">
import { db } from "./js/firebase.js";
import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const ref = doc(db,"shop","main");

function getTodayDate(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

onSnapshot(ref,snap=>{
  if(!snap.exists()) return;

  const state = snap.data();
  const tables = state.tables || [];
  const bookings = state.bookings || [];
  const records = state.records || [];

  const usingCount = tables.filter(t=>t.start).length;
  const freeCount = tables.length - usingCount;

  const today = getTodayDate();

  const todayBookingCount = bookings.filter(b=>{
    return b.date === today;
  }).length;

  const todayRevenue = records
    .filter(r=>{
      const ts = r.timestamp || r.time || r.date;
      if(!ts) return false;
      const d = new Date(ts);
      if(isNaN(d.getTime())) return false;

      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      return key === today;
    })
    .reduce((sum,r)=>sum + Number(r.totalJPY || r.jpy || 0),0);

  document.getElementById("homeUsingCount").innerText = `${usingCount}桌`;
  document.getElementById("homeFreeCount").innerText = `${freeCount}桌`;
  document.getElementById("homeBookingCount").innerText = `${todayBookingCount}组`;
  document.getElementById("homeRevenue").innerText = `¥${todayRevenue.toLocaleString()}`;
});

window.go = function(page){
  location.href = page;
};

window.goOwner = function(){
  const pw = prompt("请输入老板密码");

  if(pw !== "prompt"){
    alert("密码错误");
    return;
  }

  sessionStorage.setItem("owner_auth","1");

  location.href = "./owner.html";
};

</script>

</body>
</html>
