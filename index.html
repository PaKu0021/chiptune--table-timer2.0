<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiptune 系统入口</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="center">
  <h1>Chiptune 系统</h1>

  <button onclick="go('app.html')">进入计时系统</button>
  <button onclick="goOwner()">老板模式</button>
  <button onclick="go('booking.html')">预约系统</button>
</div>

<script>
function go(page){
  location.href = page;
}

function goOwner(){
  const pw = prompt("输入老板密码");
  if(pw !== "admin123"){
    alert("密码错误");
    return;
  }
  location.href = "owner.html";
}
</script>

</body>
</html>
