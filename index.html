<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chiptune 系统</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body class="home-page">

<div class="home-shell">
<div class="brand-card brand-dashboard">
  <div class="hero-top">
    <div class="logo-dot">C</div>
    <div>
      <h1>Chiptune</h1>
      <p>池袋拼豆体验店管理系统</p>
    </div>
  </div>

  <div class="hero-stats">
    <div class="stat-item">
      <div class="stat-label">使用中</div>
      <div class="stat-value" id="homeUsingCount">0桌</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">空闲</div>
      <div class="stat-value" id="homeFreeCount">0桌</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">今日预约</div>
      <div class="stat-value" id="homeBookingCount">0组</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">今日营业额</div>
      <div class="stat-value" id="homeRevenue">¥0</div>
    </div>
  </div>
</div>
<div class="home-grid">

<a id="cardBooking" class="home-card" href="./booking.html">
  <span class="emoji">📅</span>
    <strong>预约系统</strong>
    <small>客人预约 / 指定桌位 / 调整座位</small>
  </a>

<a id="cardApp" class="home-card" href="./app.html">
  <span class="emoji">⏱️</span>
    <strong>进入计时系统</strong>
    <small>桌位计时 / 结账 / 二维码 / 多设备同步</small>
  </a>

<a id="cardBill" class="home-card" href="./today-bill.html">
  <div class="emoji">🧾</div>
    <strong>今日账单</strong>
    <small>只查看今天收款记录</small>
  </a>

<a id="cardOwner" class="home-card" href="./owner.html">
  <span class="emoji">📊</span>
    <strong>老板模式</strong>
    <small>收入统计 / 报表 / CSV导出</small>
  </a>

</div>

      
</div>
 


<script type="module">
import { db } from "./js/firebase.js";
import { loadLocalState, reconcileCloudState, loadLocalRecords, mergeRecordLists, installConnectionGuard, flushPending, subscribeAllRecords, emergencySaveRecord, emergencySaveState } from "./js/safe-state.js?v=2.9.10";
import { getCurrentBusinessDate, getRecordBusinessDate } from "./js/business-day.js?v=2.9.10";
import { doc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
const ref = doc(db,"shop","main");
const recordsRef = collection(db,"records");

let homeState = null;
let allRecords = [];
installConnectionGuard();

loadLocalState().then(local=>{
  if(local){
    homeState = local;
    updateHome();
  }
});

loadLocalRecords().then(localRecords=>{
  allRecords = mergeRecordLists(allRecords, localRecords);
  updateHome();
});

window.addEventListener("chiptune-online-change",e=>{
  if(e.detail?.online) flushPending({db,ref}).catch(err=>console.warn("自动同步失败",err));
});


onSnapshot(ref,async snap=>{
  if(!snap.exists()) return;

  homeState = await reconcileCloudState(snap.data());
  updateHome();
});

try{
  subscribeAllRecords({
    db,
    onChange:list=>{ allRecords=list; updateHome(); }
  });
}catch(err){
  console.warn("首页账单监听启动失败，不影响导航",err);
}

function getCalendarDate(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}


let activeRevenueRepairRunning = false;
let activeRevenueRepairDone = false;

function getTablePackage(table){
  if(table?.customPackage) return table.customPackage;
  return (homeState?.packages || [])[Number(table?.packageIndex || 0)] || {};
}

async function repairActivePrepaidRevenue(){
  if(activeRevenueRepairRunning || activeRevenueRepairDone || !homeState) return;
  activeRevenueRepairRunning = true;
  try{
    const tables = Array.isArray(homeState.tables) ? homeState.tables : [];
    let stateChanged = false;
    let repairedCount = 0;

    for(const table of tables){
      if(!table?.start || String(table.payTiming || "prepaid") !== "prepaid") continue;

      const pkg = getTablePackage(table);
      const packagePrice = Math.max(0,Number(pkg?.price || 0));
      const expectedPaid = Math.max(0,Number(table.paidJPY || 0),packagePrice);
      if(expectedPaid <= 0) continue;

      let record = allRecords.find(r=>String(r?.id || "") === String(table.recordId || ""));
      const currentPaid = record ? sumPaymentsJPY(record) : 0;
      if(record && currentPaid > 0) continue;

      if(!table.recordId){
        const visitId = table.visitId || `visit_repair_${Number(table.start)}_${String(table.name || "table").replace(/\s+/g,"_")}`;
        table.visitId = visitId;
        table.recordId = `record_${visitId}`;
        stateChanged = true;
      }

      if(Number(table.paidJPY || 0) <= 0){
        table.paidJPY = expectedPaid;
        table.paidRMB = 0;
        table.paidAt = Number(table.start || Date.now());
        stateChanged = true;
      }

      const payment = {
        id:`repair_prepaid_${table.recordId}`,
        operationId:`repair_prepaid_${table.recordId}`,
        type:"收入",
        reason:"套餐预付款",
        pay:table.pay || "未记录",
        currency:(table.pay === "微信" || table.pay === "支付宝") ? "人民币" : "日元",
        amountJPY:expectedPaid,
        amountRMB:(table.pay === "微信" || table.pay === "支付宝") ? Math.round(expectedPaid * 0.044) : 0,
        note:"历史异常账单自动修复",
        timestamp:Number(table.start || Date.now())
      };

      record = {
        ...(record || {}),
        id:String(table.recordId),
        visitId:table.visitId || record?.visitId || "",
        timestamp:Number(table.start || record?.timestamp || Date.now()),
        startAt:Number(table.start || record?.startAt || Date.now()),
        businessDate:getRecordBusinessDate({timestamp:Number(table.start || Date.now()),startAt:Number(table.start || Date.now())}),
        time:new Date(Number(table.start || Date.now())).toLocaleString(),
        tableName:table.name || record?.tableName || "",
        customerName:table.customer?.name || record?.customerName || "",
        phoneLast4:table.customer?.phoneLast4 || record?.phoneLast4 || "",
        customerType:table.type || record?.customerType || "walkin",
        packageName:pkg?.name || record?.packageName || "",
        packageMinutes:pkg?.unlimited ? "不限时" : Number(pkg?.minutes || record?.packageMinutes || 0),
        packagePrice,
        originalJPY:Math.max(packagePrice,Number(record?.originalJPY || 0)),
        payments:[payment],
        paidJPY:expectedPaid,
        dueJPY:Math.max(0,packagePrice-expectedPaid),
        totalJPY:expectedPaid,
        totalRMB:Number(payment.amountRMB || 0),
        pay:payment.pay,
        currency:payment.currency,
        payTiming:"prepaid",
        paidStatus:"已结清",
        status:"进行中",
        closed:false,
        updatedAt:Date.now(),
        localUpdatedAt:Date.now()
      };

      emergencySaveRecord({db,ref,record});
      allRecords = mergeRecordLists(allRecords,[record]);
      repairedCount++;
    }

    if(stateChanged){
      emergencySaveState({db,ref,state:homeState,action:"repair_active_prepaid_revenue"});
    }
    if(repairedCount){
      console.info(`已自动修复 ${repairedCount} 张进行中套餐收款账单`);
      updateHome();
    }
    activeRevenueRepairDone = true;
  }catch(err){
    console.warn("进行中账单自动修复失败，将在下次刷新重试",err);
  }finally{
    activeRevenueRepairRunning = false;
  }
}

function updateHome(){
  if(!homeState) return;
  repairActivePrepaidRevenue().catch(()=>{});

  const tables = homeState.tables || [];
  const bookings = homeState.bookings || [];
  const records = allRecords;

  const usingCount = tables.filter(t=>t.start).length;
  const freeCount = tables.length - usingCount;

  const today = getCurrentBusinessDate();
  const calendarToday = getCalendarDate();

  const todayBookingCount = bookings.filter(b=>{
    return b.date === calendarToday;
  }).length;

  const todayRevenue = records
    .filter(r=>{

      const key = getRecordBusinessDate(r);
      return key === today;


    })
    .reduce((sum,r)=>sum + sumPaymentsJPY(r),0);

  document.getElementById("homeUsingCount").innerText = `${usingCount}桌`;
  document.getElementById("homeFreeCount").innerText = `${freeCount}桌`;
  document.getElementById("homeBookingCount").innerText = `${todayBookingCount}组`;
  document.getElementById("homeRevenue").innerText = `¥${todayRevenue.toLocaleString()}`;
}

const activeCard = localStorage.getItem("home_active");

if(activeCard){
  document.querySelectorAll(".home-card").forEach(btn=>{
    btn.classList.remove("primary");
  });

  document.getElementById(activeCard)?.classList.add("primary");
}

function normalizePayments(r){
  if(Array.isArray(r.payments)) return r.payments;

  return [{
    amountJPY:Number(r.totalJPY || r.jpy || 0)
  }];
}

function sumPaymentsJPY(r){
  return normalizePayments(r)
    .reduce((sum,p)=>sum + Number(p.amountJPY || 0),0);
}

</script>

</body>
</html>
