<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预约系统</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="page-shell">

  <div class="app-header">
    <div class="app-title">
      <h1>预约系统</h1>
      <p>录入客人信息 / 指定桌位 / 调整座位</p>
    </div>

    <div class="header-actions">
      <button onclick="location.href='./index.html'">返回首页</button>
      <button class="btn-main" onclick="openDatePicker()">选择日期</button>
    </div>
  </div>

  <div class="panel">
    <h2 id="bookingDateTitle">今日预约时间表</h2>
    <div id="bookingGrid" class="booking-grid-wrap"></div>
  </div>

  <div class="panel">
    <h2>预约列表</h2>
    <div id="list"></div>
  </div>

</div>

<div id="datePickerModalBg" class="modal-bg">
  <div class="modal">
    <h2>选择日期</h2>
    <input id="datePickerInput" type="date">
    <button class="btn-main full" onclick="confirmDatePicker()">查看这一天</button>
    <button class="btn-ghost full" onclick="closeDatePicker()">取消</button>
  </div>
</div>

<div id="bookingModalBg" class="modal-bg">
  <div class="modal">
    <h2>创建预约</h2>
    <div id="selectedRangeText" style="margin-bottom:12px;font-weight:800;"></div>

    <input id="modalName" placeholder="客人姓名">
    <input id="modalPhone" placeholder="手机号">

    <button class="btn-main full" onclick="confirmGridBooking()">确认预约</button>
    <button class="btn-ghost full" onclick="closeBookingModal()">取消</button>
  </div>
</div>

<script type="module" src="./js/booking.js"></script>
</body>
</html>
