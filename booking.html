<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>预约系统</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="page-shell">

  <div class="app-header">
    <div class="app-title">
      <h1>预约系统</h1>
      <p>录入客人信息 / 指定桌位 / 调整座位</p>
    </div>
    <div class="header-actions">
  <div id="globalNav" class="header-actions"></div>
  <button class="btn-main" onclick="openDatePicker()">选择日期</button>
  <button class="btn-ghost" onclick="printBookingGrid()">打印时间表</button>
</div>
  </div>

<div class="panel">
 <div class="section-toggle">
  <h2 id="bookingDateTitle">今日预约时间表</h2>

  <button
    id="bookingLockBtn"
    class="btn-danger"
    onclick="toggleBookingLock()"
  >
    🔒 已锁定
  </button>
</div>

<div id="bookingLockHint" class="booking-lock-hint locked">
  当前为锁定状态，只能查看，不能创建/修改预约
</div>

<div id="bookingGrid" class="booking-grid-wrap locked-grid">
  <div style="padding:24px;text-align:center;color:#8a8174;font-weight:800;">
    正在读取桌位与预约数据…
  </div>
</div>
</div>

<div class="panel">
  <div class="section-toggle" onclick="toggleBookingList()">
    <h2>今日预约概览</h2>
    <button id="bookingListToggleBtn" class="btn-ghost" type="button">展开</button>
  </div>

  <div id="bookingSummary" style="margin-top:12px;font-weight:800;"></div>
  <div id="list" style="display:none;margin-top:12px;"></div>
</div>

</div>

<div id="datePickerModalBg" class="modal-bg">
  <div class="modal">
    <h2>选择日期</h2>
    <div class="calendar-head">
  <button class="btn-ghost" onclick="changeCalendarMonth(-1)">‹</button>
  <strong id="calendarTitle"></strong>
  <button class="btn-ghost" onclick="changeCalendarMonth(1)">›</button>
</div>

<div id="calendarGrid" class="custom-calendar"></div>

<button class="btn-main full" onclick="confirmDatePicker()">查看这一天</button>
    <button class="btn-ghost full" onclick="closeDatePicker()">取消</button>
  </div>
</div>

<div id="bookingModalBg" class="modal-bg">
  <div class="modal">
    <h2>创建预约</h2>
    <div id="selectedRangeText" style="margin-bottom:12px;font-weight:800;"></div>


    <select id="modalType" onchange="toggleModalType()">
  <option value="booking">创建预约</option>
  <option value="walkin">Walk-in 并开始计时</option>
</select>

<label for="modalType">操作类型</label>
<label for="modalName">客人姓名</label>
<input id="modalName" placeholder="请输入客人姓名">

<label for="modalPhone">手机号</label>
<input
  id="modalPhone"
  type="tel"
  inputmode="numeric"
  placeholder="请输入手机号"
>

<div id="modalPackageBox" style="display:none;">
  <label for="modalPackage">计时套餐</label>
  <select id="modalPackage"></select>
</div>

<button id="modalConfirmBtn" class="btn-main full" onclick="confirmGridBooking()">
  确认预约
</button>
    <button class="btn-ghost full" onclick="closeBookingModal()">取消</button>
  </div>
</div>

<div id="bookingActionModalBg" class="modal-bg">
  <div class="modal">

    <h2>预约详情</h2>

    <div id="bookingActionInfo"
         style="margin-bottom:12px;font-weight:800;">
    </div>

    <input id="detailName" placeholder="客人姓名">

    <input id="detailPhone" placeholder="手机号">

    <div id="detailTablesBox"></div>

    <select id="detailPackage"></select>


    <button class="btn-blue full" onclick="openMoveTableModal()">
  调整桌位
</button>

    <button class="btn-success full"
      onclick="checkInBooking()">
      到店并进入计时器
    </button>

    <button class="btn-danger full"
      onclick="cancelBooking()">
      取消预约
    </button>
    
    <button class="btn-ghost full"
      onclick="closeBookingAction()">
      关闭
    </button>

  </div>
</div>

<div id="checkInSelectModalBg" class="modal-bg">
  <div class="modal">
    <h2>到店进入计时器</h2>

    <div id="checkInSelectInfo" style="margin-bottom:12px;font-weight:800;"></div>

    <select id="checkInMode" onchange="toggleCheckInMode()">
      <option value="all">全部进入计时器</option>
      <option value="partial">部分进入计时器</option>
    </select>

    <div id="checkInTableChecks" class="table-check-grid" style="display:none;"></div>

    <button class="btn-success full" onclick="confirmCheckInSelected()">
      确认进入计时器
    </button>

    <button class="btn-ghost full" onclick="closeCheckInSelectModal()">
      取消
    </button>
  </div>
</div>

<div id="moveTableModalBg" class="modal-bg">
  <div class="modal move-modal">
    <h2>调整桌位</h2>

    <div id="moveTableInfo" style="margin-bottom:12px;font-weight:800;"></div>

    <div id="moveLineArea" class="move-line-area"></div>

    <button class="btn-main full" onclick="confirmMoveTable()">
      确认调整
    </button>

    <button class="btn-ghost full" onclick="closeMoveTableModal()">
      取消
    </button>
  </div>
</div>

<div class="modal-bg" id="assignTableModalBg">

  <div class="modal">

    <h3>分配桌位</h3>

    <div id="assignBookingInfo"></div>


    <button class="btn-main full" onclick="autoAssignBookingTable()">
  自动推荐桌位
</button>
    <div
      id="assignTableList"
      style="
      margin-top:15px;
      display:grid;
      gap:10px;
      ">
    </div>

    <div class="action-row">

      <button
        class="btn-ghost"
        onclick="closeAssignTableModal()">
        取消
      </button>

    </div>

  </div>

</div>

<div class="modal-bg" id="groupPaymentModalBg">

  <div class="modal">

    <h2>整组收款</h2>

    <div id="groupPaymentInfo"></div>

    <label>付款方式</label>

    <select id="groupPayMethod">
      <option value="现金">现金</option>
      <option value="PayPay">PayPay</option>
      <option value="微信">微信</option>
      <option value="支付宝">支付宝</option>
    </select>

    <label>付款人</label>

    <input id="groupPayName">

    <label>实收金额</label>

    <input
      id="groupPayAmount"
      type="number"
    >

    <label>备注</label>

    <input id="groupPayNote">

    <div class="action-row">

      <button
        class="btn-main"
        onclick="confirmGroupPayment()"
      >
        确认收款
      </button>

      <button
        class="btn-ghost"
        onclick="closeGroupPayment()"
      >
        取消
      </button>

    </div>

  </div>

</div>

<script type="module">
  import { renderNav } from "./js/nav.js?v=4.0.13";

  try {
    renderNav("booking");
  } catch (error) {
    console.error("预约页面导航加载失败", error);
  }

  import("./js/booking.js?v=4.0.13")
    .catch(error => {
      console.error("booking.js 加载失败", error);

      alert(
        "预约系统加载失败：\n\n" +
        (error?.name || "Error") +
        "\n" +
        (error?.message || String(error))
      );
    });
</script>

</body>
</html>
