<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>桌位计时系统</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="page-shell">
  <div class="app-header">
    <div class="app-title">
      <h1>桌位计时系统</h1>
      <p>实时计时 / 收银 / 多设备同步</p>
    </div>
    <div class="header-actions">
      <button id="notifyBtn" class="btn-ghost" type="button" onclick="initPush()">开启系统通知</button>
      <div id="globalNav"></div>
    </div>
  </div>

  <div class="panel">
  <div class="section-toggle" onclick="toggleFilterPanel()">
    <h2>搜索 / 筛选 / 排序</h2>
    <button id="filterToggleBtn" class="btn-ghost" type="button">收起</button>
  </div>

  <div id="filterPanelBody" style="display:block;margin-top:16px;">
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:8px;">

      <input
  id="searchInput"
  placeholder="搜索桌号 / 客人姓名 / 手机尾号"
  oninput="setSearchKeyword(this.value)"
>

<select id="statusFilter" onchange="setStatusFilter(this.value)">
  <option value="">全部状态</option>
  <option value="idle">未开始</option>
  <option value="using">使用中</option>
  <option value="warning">即将超时</option>
  <option value="overtime">已超时</option>
</select>

<select id="typeFilter" onchange="setTypeFilter(this.value)">
  <option value="">全部类型</option>
  <option value="walkin">Walk-in</option>
  <option value="booking">预约</option>
</select>

<select id="payFilter" onchange="setPayFilter(this.value)">
  <option value="">全部付款方式</option>
  <option value="现金">现金</option>
  <option value="PayPay">PayPay</option>
  <option value="微信">微信</option>
  <option value="支付宝">支付宝</option>
</select>
      
      <select id="groupViewMode" onchange="setGroupViewMode(this.value)">
        <option value="table">普通桌位排列</option>
        <option value="group">按组排列</option>
      </select>

      <select id="sortMode" onchange="render()">
        <option value="table">按桌号排序</option>
        <option value="remain">按剩余时间排序</option>
        <option value="used">按已用时间排序</option>
        <option value="amount">按当前金额排序</option>
      </select>

      <button id="sortDirectionBtn" class="btn-ghost" onclick="toggleSortDirection()">
        当前：正序
      </button>
    </div>
  </div>
</div>

<div class="panel">
  <h2>批量操作</h2>
  <div class="action-row">

    <button class="btn-main" onclick="openBatchStart()">
      批量开始
    </button>

    <button class="btn-success" onclick="openBatchCheckout()">
      批量结账
    </button>

    <button class="btn-ghost" onclick="openGroupManager('')">
      创建 / 重组
    </button>

  </div>
</div>

  <div id="alarmPanel" class="alarm-panel">
    <h3>⚠️ 超时提醒</h3>
    <div id="alarmList"></div>
  </div>

  <div id="tables" class="tables"></div>
</div>

<div id="batchStartModalBg" class="modal-bg">
  <div class="modal">
    <h2>批量开始</h2>

    <select id="batchPackageSelect"></select>

    <select id="batchPayTimingSelect">
    <option value="prepaid">先付款</option>
    <option value="postpaid">后付款</option>
    </select>

    <input id="batchGroupName" placeholder="组名称（例：王小姐一组）">
    <select id="batchGroupPaymentMode">
      <option value="split">分开 / 自由组合付款</option>
      <option value="unified">统一付款</option>
    </select>

    <select id="batchPaySelect">
    <option value="">请选择付款方式</option>
    <option value="现金">现金</option>
    <option value="PayPay">PayPay</option>
    <option value="微信">微信</option>
    <option value="支付宝">支付宝</option>
    </select>

    <div id="batchTableChecks" class="table-grid"></div>

    <button class="btn-main full" onclick="confirmBatchStart()">确认开始</button>
    <button class="btn-ghost full" onclick="closeBatchStart()">取消</button>
  </div>
</div>

<div id="batchCheckoutModalBg" class="modal-bg">
  <div class="modal">
    <h2>批量结账</h2>

    <div class="panel" style="margin:12px 0;">
      <label style="font-weight:900;">
        <input type="checkbox" id="groupPayMode" onchange="toggleGroupPayMode()">
        整组代付
      </label>

      <div id="groupPayBox" style="display:none;margin-top:12px;">
        <label>付款人</label>
        <input id="groupPayerName" placeholder="例：2号桌客人 / 王小姐">

        <label>整组付款方式</label>
        <select id="groupPayMethod">
          <option value="">请选择付款方式</option>
          <option value="现金">现金</option>
          <option value="PayPay">PayPay</option>
          <option value="微信">微信</option>
          <option value="支付宝">支付宝</option>
        </select>

        <label>整组实收总金额</label>
        <input id="groupPayTotal" type="number" placeholder="例：9900">

        <label>备注</label>
        <input id="groupPayNote" placeholder="例：2号桌代付全组费用">

        <div style="font-weight:900;margin-top:14px;">自由付款明细（可选）</div>
        <div id="groupPaymentLines"></div>
        <button class="btn-ghost full" type="button" onclick="addGroupPaymentLine()">＋ 添加付款人</button>
        <div style="font-size:13px;color:#777;margin-top:6px;">例如4人组可填写两笔：A付2人、B付2人。填写明细后，以明细合计为准。</div>
      </div>
    </div>

    <div id="batchCheckoutTableChecks" class="table-grid"></div>

    <button class="btn-success full" onclick="confirmBatchCheckout()">确认批量结账</button>
    <button class="btn-ghost full" onclick="closeBatchCheckout()">取消</button>
  </div>
</div>


<div id="checkoutModalBg" class="modal-bg">
  <div class="modal">
    <h2>结账确认</h2>
    <div id="checkoutInfo"></div>
    <h3 id="checkoutAmount"></h3>

    <button id="roundButton" class="btn-ghost full" onclick="toggleRound()">抹零</button>
    <button class="btn-success full" onclick="confirmCheckout()">确认结账</button>
    <button class="btn-ghost full" onclick="closeCheckout()">取消</button>
  </div>
</div>


<div id="refundModalBg" class="modal-bg">
  <div class="modal">
    <h2>退款</h2>
    <div id="refundInfo"></div>
    <label>退款金额（日元）</label>
    <input id="refundAmount" type="number" min="1" step="1" placeholder="请输入退款金额">
    <label>退款方式</label>
    <select id="refundPay">
      <option value="">请选择退款方式</option>
      <option value="现金">现金</option>
      <option value="PayPay">PayPay</option>
      <option value="微信">微信</option>
      <option value="支付宝">支付宝</option>
    </select>
    <label>备注</label>
    <input id="refundNote" placeholder="例：顾客取消加时、设备故障">
    <button class="btn-danger full" onclick="confirmRefund()">确认退款</button>
    <button class="btn-ghost full" onclick="closeRefund()">取消</button>
  </div>
</div>
<div id="groupManagerModalBg" class="modal-bg">
  <div class="modal">
    <h2 id="groupManagerTitle">创建新组</h2>
    <label>组名称</label>
    <input id="groupManagerName" placeholder="例：王小姐一组">
    <label>付款安排</label>
    <select id="groupManagerPaymentMode">
      <option value="split">分开 / 自由组合付款</option>
      <option value="unified">统一付款</option>
    </select>
    <div style="font-weight:900;margin:14px 0 8px;">选择组内桌位</div>
    <div id="groupManagerTables" class="table-grid"></div>
    <button id="groupManagerSave" class="btn-main full" onclick="saveGroupManager()">保存组</button>
    <button id="groupManagerDelete" class="btn-danger full" onclick="dissolveCurrentGroup()">拆散该组</button>
    <button class="btn-ghost full" onclick="closeGroupManager()">取消</button>
  </div>
</div>

<script type="module">
  import { renderNav } from "./js/nav.js?v=4.0.15";

  try {
    renderNav("app");
  } catch (error) {
    console.error("导航加载失败", error);
  }

  import("./js/app.js?v=4.0.15").catch(error => {
    alert(
      "计时系统加载失败：\n\n" +
      error.name + "\n" +
      error.message
    );

    console.error("app.js 加载失败", error);
  });
</script>

<div id="forceEndModalBg" class="modal-bg">
  <div class="modal">
    <h2>强制结束桌位</h2>
    <div id="forceEndInfo"></div>
    <button id="forceEndConfirmButton" class="btn-danger full" onclick="confirmForceEnd()">确认强制结束</button>
    <button class="btn-ghost full" onclick="closeForceEnd()">取消</button>
  </div>
</div>

<div id="moveRunningModalBg" class="modal-bg">
  <div class="modal">
    <h2>移动桌位</h2>

    <div id="moveRunningInfo" style="font-weight:900;margin-bottom:12px;"></div>

    <div id="moveRunningLineArea" style="position:relative;">
      <svg
        id="moveRunningSvg"
        style="position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:1;"
      ></svg>

      <div style="font-weight:900;margin:10px 0;">当前桌位</div>
      <div id="moveRunningFromBox" class="move-drag-grid"></div>

      <div style="font-weight:900;margin:16px 0 10px;">拖到目标空桌</div>
      <div id="moveRunningToBox" class="move-drag-grid"></div>
    </div>

    <button class="btn-success full" onclick="confirmMoveRunningLine()">
      确认移动
    </button>

    <button class="btn-ghost full" onclick="closeMoveRunningLineModal()">
      取消
    </button>
  </div>
</div>
</body>
</html>
