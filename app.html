<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>桌位计时系统</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="page-shell">
  <div class="app-header">
    <div class="app-title">
      <h1>桌位计时系统</h1>
      <p>实时计时 / 收银 / 超时提醒</p>
    </div>

    <div class="header-actions">
      <button class="btn-ghost" onclick="location.href='./index.html'">返回</button>
      <button class="btn-main" onclick="initPush()">开启锁屏提醒</button>
    </div>
  </div>

  <div id="alarmPanel" class="alarm-panel">
    <h3>⚠️ 超时提醒</h3>
    <div id="alarmList"></div>
  </div>

  <div id="tables" class="tables"></div>
</div>

<div id="checkoutModalBg" class="modal-bg">
  <div class="modal">
    <h2>结账确认</h2>
    <div id="checkoutInfo"></div>
    <h3 id="checkoutAmount"></h3>

    <button id="roundButton" class="btn-ghost full" onclick="toggleRound()">抹零</button>
    <button class="btn-success full" onclick="confirmCheckout()">确认结账</button>
    <button class="btn-ghost full" onclick="closeCheckout()">取消</button>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
