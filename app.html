<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌位计时系统</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="page-shell">

  <!-- 顶部 -->
  <div class="app-header">
    <div class="app-title">
      <h1>桌位计时系统</h1>
      <p>实时计时 / 收银 / 超时提醒</p>
    </div>

    <div class="header-actions">
      <button onclick="location.href='./index.html'">返回</button>
      <button onclick="initPush()" class="btn-main">开启锁屏提醒</button>
    </div>
  </div>

  <!-- 超时提醒 -->
  <div id="alarmBox" class="alarm-panel">
    <h3>⚠️ 超时提醒</h3>
    <div id="alarmList"></div>
  </div>

  <!-- 桌位 -->
  <div id="tables" class="tables"></div>

</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
