<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>收银记录打印</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body class="print-page">

<div class="print-toolbar no-print">
  <button onclick="location.href='./cashier.html'">← 返回收银记录</button>
  <button onclick="window.print()">打印</button>
</div>

<h2 id="printTitle">收银记录</h2>

<table class="record-table">
  <thead>
    <tr>
<th>时间</th>
<th>桌位</th>
<th>客人</th>
<th>类型</th>
<th>套餐</th>
<th>原价</th>
<th>实收日元</th>
<th>人民币</th>
<th>支付方式</th>
<th>币种</th>
<th>抹零</th>      
<th>收款截图</th>
    </tr>
  </thead>
  <tbody id="printRows"></tbody>
</table>

<h2>支付方式总计</h2>
<div id="printSummary"></div>
<h2>收款截图</h2>
<div id="receiptPrintGrid" class="receipt-print-grid"></div>

<script type="module" src="./js/cashier-print.js"></script>
</body>
</html>
